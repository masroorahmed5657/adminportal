
<app-header2></app-header2>
<div class="container-fluid">
    <div class="row">
        <!-- <div class="col-2"><app-header></app-header></div> -->

        <div class="col-11 col-lg-11 col-md-11 col-sm-12 mt-5">
            <!-- ********************************************************* ADD SECTION ******************************************-->

            <!-- MAIN Container -->
            <div class="container-fluid bg-white">
                <!-- FORM Section -->
                <form [formGroup]="productForm">
                    <h1 class="h1"
                        style="text-align:center ;background-color:#be0b31; font-weight:bolder ; color: white; font-size: x-large; padding: 0.5rem;">
                        Add Product </h1>


                    <div class="row">
                        <div class="col-lg-2 col-md-2">&nbsp;</div>
                        <div class="col-lg-8 col-md-8" style="margin-bottom: 5px; margin-right: 10px;">

                            <button type="button" class="btn btn-success "
                                style="font-size: xx-large;margin-right: 10px;" (click)="onSubmit()">
                                <fa-icon [icon]="faSave"></fa-icon> &nbsp;Save
                            </button>

                            <button type="button" class="btn btn-primary" style="font-size: xx-large;margin-right: 10px;"
                                (click)="backToList()">
                                <fa-icon [icon]="faHome"></fa-icon>&nbsp;List
                            </button>
                            <button type="button" class="btn btn-warning" style="font-size: xx-large;"
                                (click)="backToHome()">
                                <fa-icon [icon]="faDashboard"></fa-icon>&nbsp;Home
                            </button>


                        </div>
                        <div class="col-lg-2 col-md-2">&nbsp;</div>
                    </div>
                    <!-- Save Button Section Ends -->

                    <!-- Data Input Form Section -->
                    <div class="row">

                        <!-- ******************** DATA DIV ********************** -->
                        <div class="col-lg-12 col-md-12">

                            <div class="col-lg-12 col-md-12">
                                <div class="row">
                                    <!-- Column -->
                                    <div class="col-lg-12">

                                        <div class="card">
                                            <div class="card-body">
                                                <div class="form-body">
                                                    <div class="row">
                                                        <!-- Product Name -->
                                                        <div class="col-md-5">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Name:</label>
                                                            <div class="mb-3">
                                                                <div class="input-group mb-3">
                                                                    <input type="text" class="form-control"
                                                                        formControlName="productName"
                                                                        placeholder="Product Name"
                                                                        aria-describedby="basic-addon2"
                                                                        [ngClass]="{ 'is-invalid': submitted && f['productName'].errors }"
                                                                        required>
                                                                </div>
                                                                <div *ngIf="submitted && f['productName'].errors"
                                                                    style="color: red; font-weight: bold;">
                                                                    <div *ngIf="f['productName'].errors['required']">
                                                                        Product
                                                                        Name is required</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!-- Product Category -->
                                                        <div class="col-md-4">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Category:</label>
                                                            <div class="mb-3">
                                                                <select class="form-select" formControlName="categoryId"
                                                                    (change)="categoryProductChange()"
                                                                    data-placeholder="Choose a Category" tabindex="1"
                                                                    [ngClass]="{ 'is-invalid': submitted && f['categoryId'].errors }"
                                                                    required>
                                                                    <option *ngFor="let category of categoryList"
                                                                        [value]="category.categoryId">
                                                                        {{category.category}}-{{category.subCategory}}
                                                                    </option>
                                                                </select>
                                                                <div *ngIf="submitted && f['categoryId'].errors"
                                                                    style="color: red; font-weight: bold;">
                                                                    <div *ngIf="f['categoryId'].errors['required']">
                                                                        Category is
                                                                        required</div>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div class="col-md-3">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Brands:</label>
                                                            <div class="mb-3">
                                                                <select class="form-select" formControlName="brandId"
                                                                    data-placeholder="Choose a Brand" tabindex="1"
                                                                    [ngClass]="{ 'is-invalid': submitted && f['brandId'].errors }"
                                                                    required>
                                                                    <option *ngFor="let brands of brandsList"
                                                                        [value]="brands.brandId">
                                                                        {{brands.brandName}}
                                                                    </option>
                                                                </select>
                                                                <div *ngIf="submitted && f['brandId'].errors"
                                                                    style="color: red; font-weight: bold;">
                                                                    <div *ngIf="f['brandId'].errors['required']">Brands
                                                                        is
                                                                        required</div>
                                                                </div>
                                                            </div>
                                                        </div>

                                                    </div> <!--ROW-->

                                                    <div class="row">
                                                        <!-- Product Price -->
                                                        <div class="col-md-2">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Price:
                                                            </label>
                                                            <div class="mb-3">
                                                                <div class="input-group mb-3">
                                                                    <span class="input-group-text" id="basic-addon1">
                                                                        <i class="ti-money"></i>
                                                                        <fa-icon [icon]="faDollar"></fa-icon>
                                                                    </span>
                                                                    <input type="number" class="form-control"
                                                                        formControlName="unitPrice" step="1" min="0"
                                                                        max="500000" size="4"
                                                                        (keypress)="chkNumber('unitPrice')"
                                                                        placeholder="Price" aria-label="Price"
                                                                        aria-describedby="basic-addon1"
                                                                        [ngClass]="{ 'is-invalid': submitted && f['unitPrice'].errors }"
                                                                        required>
                                                                </div>
                                                                <div *ngIf="submitted && f['unitPrice'].errors"
                                                                    style="color: red; font-weight: bold;">
                                                                    <div *ngIf="f['unitPrice'].errors['required']">Price
                                                                        is
                                                                        required</div>
                                                                </div>

                                                            </div>
                                                        </div>
                                                        <!-- Product Wholesale: -->
                                                        <div class="col-md-2">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Wholesale:</label>
                                                            <div class="mb-2">
                                                                <div class="input-group mb-3">
                                                                    <span class="input-group-text" id="basic-addon2">
                                                                        <i class="ti-cut"></i>
                                                                        <fa-icon [icon]="faDollar"></fa-icon>
                                                                    </span>
                                                                    <input type="number" class="form-control"
                                                                        formControlName="wholesalePrice" step="1"
                                                                        min="0" max="500000" size="4"
                                                                        (keypress)="chkNumber('wholesalePrice')"
                                                                        placeholder="wholesalePrice"
                                                                        aria-label="wholesalePrice"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!-- Product salePrice: -->
                                                        <div class="col-md-2">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Sale
                                                                Price:</label>
                                                            <div class="mb-2">
                                                                <div class="input-group mb-3">
                                                                    <span class="input-group-text" id="basic-addon2">
                                                                        <i class="ti-cut"></i>
                                                                        <fa-icon [icon]="faDollar"></fa-icon>
                                                                    </span>
                                                                    <input type="number" class="form-control"
                                                                        formControlName="salePrice" step="1" min="0"
                                                                        max="500000" size="4"
                                                                        (keypress)="chkNumber('salePrice')"
                                                                        placeholder="salePrice" aria-label="salePrice"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <!-- Product Purchase Price: -->
                                                        <div class="col-md-2">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Purchase
                                                                Price:</label>
                                                            <div class="mb-2">
                                                                <div class="input-group mb-3">
                                                                    <span class="input-group-text" id="basic-addon2">
                                                                        <i class="ti-cut"></i>
                                                                        <fa-icon [icon]="faDollar"></fa-icon>
                                                                    </span>
                                                                    <input type="number" class="form-control"
                                                                        formControlName="purchasePrice" step="1" min="0"
                                                                        max="500000" size="4"
                                                                        (keypress)="chkNumber('purchasePrice')"
                                                                        placeholder="Purchase" aria-label="Discount"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!-- Product Discount -->
                                                        <div class="col-md-2">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Discount:</label>
                                                            <div class="mb-3">
                                                                <div class="input-group mb-3">
                                                                    <span class="input-group-text" id="basic-addon2">
                                                                        <i class="ti-cut"></i>
                                                                        <fa-icon [icon]="faDollar"></fa-icon>
                                                                    </span>
                                                                    <input type="number" class="form-control"
                                                                        formControlName="discount" step="1" min="0"
                                                                        max="500000" size="4"
                                                                        (keypress)="chkNumber('discount')"
                                                                        placeholder="Discount" aria-label="Discount"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div class="col-md-2">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Tax:</label>
                                                            <div class="mb-3">
                                                                <div class="input-group mb-3">
                                                                    <span class="input-group-text" id="basic-addon2">
                                                                        <i class="ti-cut"></i>
                                                                        <fa-icon [icon]="faDollar"></fa-icon>
                                                                    </span>
                                                                    <input type="number" class="form-control"
                                                                        formControlName="tax" step="1" min="0"
                                                                        max="100" size="4"
                                                                        (keypress)="chkNumber('tax')"
                                                                        placeholder="Tax" aria-label="Tax"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>

                                                    </div>
                                                    <div class="row">
                                                        <!-- Product Quantity -->
                                                        <div class="col-md-2">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Quantity:</label>
                                                            <div class="mb-2">
                                                                <div class="input-group mb-3">

                                                                    <input type="number" class="form-control"
                                                                        formControlName="quantity" step="1" min="0"
                                                                        max="500000" size="4"
                                                                        (keypress)="chkNumber('quantity')"
                                                                        placeholder="quantity" aria-label="Discount"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <!-- made in  -->

                                                        <div class="col-md-2 ">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Madein:</label>

                                                            <div class="mb-4">
                                                                <input class="form-control" formControlName="madein"
                                                                    rows="3" cols="20">
                                                            </div>

                                                        </div>
                                                        <!--  Product Physicaldimension -->
                                                        <div class="col-md-2">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Dimension:</label>

                                                            <div class="mb-3">
                                                                <input class="form-control"
                                                                    formControlName="physicalDimension">
                                                            </div>
                                                        </div>

                                                        <!-- UPC -->
                                                        <div class="col-md-3 ">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">UPC:</label>
                                                            <div class="mb-3">
                                                                <input class="form-control" formControlName="upc"
                                                                    rows="3" cols="20">

                                                            </div>
                                                        </div>
                                                        <!-- SKU -->
                                                        <div class="col-md-3 ">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">SKU:</label>
                                                            <div class="mb-4">
                                                                <input class="form-control" formControlName="sku"
                                                                    rows="3" cols="20">
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div class="row">
                                                        <!-- Abbr Name -->
                                                        <div class="col-md-3 " *ngIf="appName!=='ZUBAIDA'">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Abbreviated
                                                                Name:</label>

                                                            <div class="mb-3">
                                                                <div class="input-group mb-3">
                                                                    <input type="text" class="form-control"
                                                                        formControlName="abbrName" style="width:90%"
                                                                        placeholder="Abbreviated Name"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!-- Product Weight -->
                                                        <div class="col-md-3" *ngIf="appName!=='ZUBAIDA'">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Weight:</label>
                                                            <div class="mb-3">
                                                                <div class="input-group mb-3">

                                                                    <input  type="number" class="form-control"
                                                                        formControlName="weight" placeholder="weight" [value]="0"
                                                                        step="1" min="0" max="50000" size="4"
                                                                        (keypress)="chkNumber('weight')"
                                                                        aria-label="Discount"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!-- Product Measure of Unit -->
                                                        <div class="col-md-2" *ngIf="appName!=='ZUBAIDA'">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Unit:</label>
                                                            <div class="mb-3">
                                                                <div class="input-group mb-3">
                                                                    <select class="form-select"
                                                                        formControlName="unitName"
                                                                        data-placeholder="unitName" tabindex="1">
                                                                        <option value="gm">gm</option>
                                                                        <option value="kg">kg</option>
                                                                        <option value="liter">liter</option>
                                                                        <option value="ft">ft</option>
                                                                        <option value="inch">inch</option>
                                                                        <option value="pcs">pcs</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div class="col-md-3" *ngIf="appName!=='ZUBAIDA'">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Expiry
                                                                Date:</label>
                                                            <div class="mb-3">
                                                                <div class="input-group mb-3">

                                                                    <input type="date" class="form-control"
                                                                        formControlName="expiryDate"
                                                                        placeholder="Expiry Date"
                                                                        aria-label="Expiry Date"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div class="col-md-3" *ngIf="appName!=='ZUBAIDA'">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Case
                                                                Quantity:</label>
                                                            <div class="mb-2">
                                                                <div class="input-group mb-3">

                                                                    <input type="number" class="form-control"
                                                                        formControlName="qtyCase" step="1" min="0"
                                                                        max="500000" size="4"
                                                                        (keypress)="chkNumber('caseQuantity')"
                                                                        placeholder="Case Quantity"
                                                                        aria-label="Case Quantity"
                                                                        aria-describedby="basic-addon2">
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <!--  Product Description -->
                                                        <div class="col-md-12 ">
                                                            <label class="form-label"
                                                                style="font-size:18px;font-weight:bolder;">Description:</label>
                                                            <div class="mb-3">
                                                                <textarea class="form-control"
                                                                    formControlName="productDetails" rows="5"
                                                                    [cols]="20"
                                                                    [ngClass]="{ 'is-invalid': submitted && f['productDetails'].errors }"
                                                                    required style="width: 100% !important;">
                              </textarea>
                                                                <div *ngIf="submitted && f['productDetails'].errors"
                                                                    style="color: red; font-weight: bold;">
                                                                    <div *ngIf="f['productDetails'].errors['required']">
                                                                        Product
                                                                        Description is required
                                                                    </div>
                                                                </div>

                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div class="row">
                                                        <!-- Popular Flag -->
                                                        <div class="col-md-2">
                                                            <div class="form-check">
                                                                <input class="form-check-input" type="checkbox"
                                                                    formControlName="popularFlag">
                                                                <label class="form-check-label" for="popularFlag">
                                                                    <b class="form-label"
                                                                        style="font-size:18px;font-weight:bolder;">Popular</b>
                                                                </label>
                                                            </div>
                                                        </div>
                                                        <!--Status Flag -->
                                                        <div class="col-md-2">
                                                            <div class="form-check">
                                                                <input class="form-check-input" type="checkbox"
                                                                    formControlName="productStatus">
                                                                <label class="form-check-label" for="productStatus">
                                                                    <b class="form-label"
                                                                        style="font-size:18px;font-weight:bolder;">Active</b>
                                                                </label>
                                                            </div>
                                                        </div>
                                                        <!-- Sell In Pcs -->
                                                        <div class="col-md-2 ">
                                                            <div class="form-check">
                                                                <input class="form-check-input" type="checkbox"
                                                                    formControlName="sellinPcs">
                                                                <label class="form-check-label" for="sellinPcs">
                                                                    <b class="form-label"
                                                                        style="font-size:18px;font-weight:bolder;">Sellin
                                                                        Pieces</b>
                                                                </label>
                                                            </div>
                                                        </div>
                                                        <!-- <div class="col-md-2 ">
                                                            <div class="form-check">
                                                                <input class="form-check-input" type="checkbox"
                                                                    formControlName="cutprice"
                                                                    (change)="onCheckboxChange($event)">
                                                                <label class="form-check-label" for="cutprice">
                                                                    <b class="form-label"
                                                                        style="font-size:18px;font-weight:bolder;">CUTPRICE</b>
                                                                </label>
                                                            </div>
                                                        </div> -->


                                                        <!-- <div class="col-md-2 ">
                                                            <div class="form-check">
                                                                <input class="form-check-input" type="checkbox"
                                                                    formControlName="hottrend"
                                                                    (change)="onCheckboxChange1($event)">
                                                                <label class="form-check-label" for="hottrend">
                                                                    <b class="form-label"
                                                                        style="font-size:18px;font-weight:bolder;">HOTTREND</b>
                                                                </label>
                                                            </div>
                                                        </div> -->


                                                    </div>
                                                </div>


                                                <!-- </div> -->



                                                <!-- <div class="form-actions mt-4 pt-3 button-group">
                        <button type="submit" class="btn btn-success" (click)="onSubmit()">
                          <i class="fa fa-check"></i> Save</button>
                        &nbsp;&nbsp;
                        <button type="button" class="btn btn-danger" (click)="deleteProduct(editProduct.productId)">
                          <i class="fa fa-delete"></i> Delete</button>
                        &nbsp;&nbsp;


                        <button type="button" class="btn btn-primary"
                          (click)="onCancel()">Back to List</button>
                      </div> -->





                                                <br>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Column -->
                                </div>
                            </div>
                        </div>

                    </div>
                    <!-- Data Input Form Section Ends -->


                    <!--Attributes Start-->
                    <div class="row">
                        <div class="col"
                            style="text-align:center ;background-color:#002866; font-weight:bolder ; color: white; font-size: medium; padding: 0.5rem;">
                            <label style="color: white;" class="form-label"
                                style="font-size:18px;font-weight:bolder;">Attributes</label>
                        </div>

                        <div class="row">

                            <!-- Packaging Attributes -->
                            <div class="col-md-3">
                                <label class="form-label" style="font-size:18px;font-weight:bolder;">Sizes</label>
                                <div class="mb-3">
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="packagingAttributes1">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="packagingAttributes2">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="packagingAttributes3">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="packagingAttributes4">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="packagingAttributes5">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="packagingAttributes6">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="packagingAttributes7">
                                    </div>

                                </div>
                            </div>

                            <!-- Option Attributes -->
                            <div class="col-md-3">
                                <label class="form-label" style="font-size:18px;font-weight:bolder;" class="form-label"
                                    style="font-size:18px;font-weight:bolder;">Additional </label>
                                <div class="mb-3">
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="optionsAttributes1" [(ngModel)]="inputValue">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="optionsAttributes2" [(ngModel)]="inputValue1">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="optionsAttributes3">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="optionsAttributes4">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="optionsAttributes5">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="optionsAttributes6">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="optionsAttributes7">
                                    </div>

                                </div>
                            </div>

                            <!-- Extra Attributes -->
                            <div class="col-md-3">
                                <label class="form-label" style="font-size:18px;font-weight:bolder;" class="form-label"
                                    style="font-size:18px;font-weight:bolder;">Colors</label>
                                <div class="mb-3">
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="extraAttributes1">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="extraAttributes2">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="extraAttributes3">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="extraAttributes4">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="extraAttributes5">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="extraAttributes6">
                                    </div>
                                    <div class="form-input">
                                        <input class="form-control" type="text" value=""
                                            formControlName="extraAttributes7">
                                    </div>

                                </div>
                            </div>
                            <div class="col-md-3">

                </form>
                <form [formGroup]="warehouseForm">
                    <div class="row">
                        <div class="col-12"
                            style="text-align:center ;background-color:#002866; font-weight:bolder ; color: white; font-size: medium; padding: 0.5rem;">
                            <label style="color: white;" class="form-label"
                                style="font-size:18px;font-weight:bolder;">WareHouse</label>
                        </div>
                    </div>

                    <div class="row">
                        <!-- ******************** DATA DIV ********************** -->
                        <!-- Column -->
                        <div class="col-lg-12">

                            <div class="card">
                                <div class="card-body">
                                    <div class="form-body">
                                        <div class="row">
                                            <!-- Product WareHouse -->
                                            <div class="col-md-4">
                                                <label class="form-label"
                                                    style="font-size:18px;font-weight:bolder;">Warehouse:</label>
                                                <div class="mb-3">
                                                    <select class="form-select" formControlName="warehouseId"
                                                        data-placeholder="Warehouse" tabindex="1">

                                                        <option *ngFor="let warehouse of warehouseList"
                                                            [value]="warehouse.warehouseId">
                                                            {{warehouse.warehouseName}}
                                                        </option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div> <!--ROW-->

                                        <div class="row">
                                            <!-- Product Floor -->
                                            <div class="col-md-3">
                                                <label class="form-label"
                                                    style="font-size:18px;font-weight:bolder;">Floor:</label>
                                                <div class="mb-3">
                                                    <div class="input-group mb-3">
                                                        <input type="text" class="form-control" formControlName="wFloor"
                                                            placeholder="Floor" aria-describedby="basic-addon2">
                                                    </div>
                                                </div>
                                            </div>
                                            <!-- Product Aisle: -->
                                            <div class="col-md-3">
                                                <label class="form-label"
                                                    style="font-size:18px;font-weight:bolder;">Aisle:</label>
                                                <div class="mb-3">
                                                    <div class="input-group mb-3">
                                                        <input type="text" class="form-control" formControlName="wAisle"
                                                            placeholder="Aisle" aria-describedby="basic-addon2">
                                                    </div>
                                                </div>
                                            </div>
                                            <!-- Product Row: -->
                                            <div class="col-md-3">
                                                <label class="form-label"
                                                    style="font-size:18px;font-weight:bolder;">Row:</label>
                                                <div class="mb-3">
                                                    <div class="input-group mb-3">
                                                        <input type="text" class="form-control" formControlName="wRow"
                                                            placeholder="Row" aria-describedby="basic-addon2">
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- Product Bin: -->

                                            <div class="col-md-3">
                                                <label class="form-label"
                                                    style="font-size:18px;font-weight:bolder;">Bin:</label>
                                                <div class="mb-3">
                                                    <div class="input-group mb-3">
                                                        <input type="text" class="form-control" formControlName="wBin"
                                                            placeholder="Bin" aria-describedby="basic-addon2">
                                                    </div>
                                                </div>
                                            </div>


                                        </div>
                                        <div class="row">
                                            <!-- Product WareHouse -->
                                            <div class="col-md-3">
                                                <label class="form-label"
                                                    style="font-size:18px;font-weight:bolder;">From Warehouse:</label>
                                                <div class="mb-3">
                                                    <select class="form-select" formControlName="fromWarehouseId"
                                                        data-placeholder="Warehouse" tabindex="1">
                                                        <option *ngFor="let warehouse of warehouseList"
                                                            [value]="warehouse.fromWarehouseId">
                                                            {{warehouse.warehouseName}}
                                                        </option>
                                                    </select>
                                                </div>
                                            </div>

                                            <!-- Product Quantity -->
                                            <div class="col-md-3">
                                                <label class="form-label"
                                                    style="font-size:18px;font-weight:bolder;">Quantity:</label>
                                                <div class="mb-2">
                                                    <div class="input-group mb-3">

                                                        <input type="number" class="form-control"
                                                            formControlName="quantity" step="1" min="0" max="500000"
                                                            size="4" (keypress)="chkNumber('quantity')"
                                                            placeholder="quantity" aria-label="Discount"
                                                            aria-describedby="basic-addon2">
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-md-3">
                                                <div class="form-check"><br><br>
                                                    <input class="form-check-input" type="checkbox"
                                                        formControlName="intransitFlag">
                                                    <label class="form-check-label" for="intransitFlag">
                                                        <b>Intransit</b>
                                                    </label>
                                                </div>
                                            </div>

                                            <div class="col-md-3">
                                                <label class="form-label"
                                                    style="font-size:18px;font-weight:bolder;">Shipment Mode:</label>
                                                <div class="mb-3">
                                                    <div class="input-group mb-3">
                                                        <input type="text" class="form-control"
                                                            formControlName="shipmentMode" placeholder="Shipment Mode"
                                                            aria-describedby="basic-addon2">
                                                    </div>
                                                </div>
                                            </div>

                                        </div>

                                    </div>
                                    <br>
                                </div>
                            </div>
                        </div>
                        <!-- Column -->
                    </div>
                </form>
                <!-- FORM Section Ends here -->
            </div>
            <!-- MAIN Container Ends here-->


            <!-- CONTAINER DIV Ends here -->
            <div class="container" style="position: fixed;bottom: 0px;">
                <app-footer></app-footer>
            </div>
        </div>
    </div>
</div>
