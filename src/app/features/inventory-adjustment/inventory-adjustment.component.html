<!-- Card start -->
<div class="card border-2 shadow-sm rounded-4 mb-4">
  <div class="card-body p-3 p-md-4">

    <!-- Search Section -->
    <h5 class="fw-bold mb-3">Search Product</h5>

    <div class="row g-3">
      <!-- Barcode -->
      <div class="col-12 col-md-4">
        <label class="form-label">Scan Barcode <i class="bi bi-upc-scan"></i></label>
        <div class="input-group">
          <!-- <span class="input-group-text bg-light">
            <i class="bi bi-upc-scan"></i>
          </span> -->

          <input type="text" class="form-control" placeholder="Search by Barcode" [(ngModel)]="upc"
            (keyup)="upcSearch($event)">
        </div>
      </div>

      <div class="col-12 col-md-4 position-relative">
        <label class="fw-bold">Name</label>

        <input type="search" class="form-control" placeholder="Search By Name" (keyup)="onNameSearch($event)"
          [(ngModel)]="searchText" autocomplete="off" />

        <!-- Search result list -->
        <ul class="list-group position-absolute w-100" *ngIf="productList.length > 0"
          style="z-index: 1000; max-height: 250px; overflow-y: auto;">
          <li class="list-group-item list-group-item-action" *ngFor="let product of productList"
            (click)="selectProduct(product)">
            {{ product.productName }}
            <small class="text-muted d-block">
              {{ product.sku }} | {{(product.salePrice===null?product.unitPrice:product.salePrice) | number:'1.2-2'}}
            </small>
          </li>
        </ul>
      </div>

      <!-- SKU -->
      <div class="col-12 col-md-4">
        <label class="form-label">Enter SKU <i class="bi bi-tag"></i></label>
        <div class="input-group">
          <!-- <span class="input-group-text bg-light">
            <i class="bi bi-tag"></i>
          </span> -->


          <input type="text" class="form-control" placeholder="Search by SKU" [(ngModel)]="sku"
            (keyup)="skuSearch($event)">
        </div>
      </div>
    </div>

    <!-- Product Image -->
    <div class="text-center my-4" *ngIf="product.imageMimeType">
      <img [src]="'data:' + product.imageMimeType + ';base64,' + product.productImage"
        class="img-fluid rounded shadow-sm" style="max-height:220px" alt="Product Image">
    </div>

    <!-- Product Details -->
    <h5 class="fw-bold mb-3 py-2">Product Details</h5>

    <div class="row g-3">
      <div class="col-12 col-md-4">
        <div class="fw-semibold">
          Name: <span class="text-muted">{{ product.productName }}</span>
        </div>
      </div>

      <div class="col-12 col-md-4">
        <div class="fw-semibold">
          Qty in Stock: <span class="text-muted">{{ product.quantity }}</span>
        </div>
      </div>

      <div class="col-12 col-md-4">
        <label class="form-label">Qty Adjusted</label>
        <input type="number" class="form-control" [(ngModel)]="adjQty" required>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="d-flex flex-wrap justify-content-center gap-3 mt-4">
      <button class="btn btn-submit px-4" (click)="onSubmit()">
        <i class="bi bi-check"></i> Submit
      </button>

      <button class="btn btn-clear px-4" (click)="clear()">
        <i class="bi bi-x"></i> Clear
      </button>
    </div>

  </div>
</div>
<!-- Card end -->
