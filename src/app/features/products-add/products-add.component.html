<div class="card border border-2 " style="margin-top: 4em;">
    <div class="card-body ">

        <div class="row mb-3">
            <div class="col-12 col-lg-10">
                <!-- Page Header -->
                <!-- Main Form -->
                <form [formGroup]="productForm">
                    <div class="card shadow-sm mb-4 border-0">
                        <div class="card-body">
                            <div class="row g-3">
                                <!-- Product Name -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Product Name <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" formControlName="productName"
                                        placeholder="Enter product name" required
                                        [ngClass]="{ 'is-invalid': submitted && f['productName'].errors }">
                                    <div *ngIf="submitted && f['productName'].errors" class="invalid-feedback">
                                        <div *ngIf="f['productName'].errors['required']">Product name is required</div>
                                    </div>
                                </div>
                                <!-- Category -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Category <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" formControlName="categoryId"
                                        (change)="categoryProductChange()" required
                                        [ngClass]="{ 'is-invalid': submitted && f['categoryId'].errors }">
                                        <option value="" disabled selected>Select a category</option>
                                        <option *ngFor="let category of categoryList" [value]="category.categoryId">
                                            {{category.category}}-{{category.subCategory}}
                                        </option>
                                    </select>
                                    <div *ngIf="submitted && f['categoryId'].errors" class="invalid-feedback">
                                        <div *ngIf="f['categoryId'].errors['required']">Category is required</div>
                                    </div>
                                </div>
                                <!-- Brand -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Brand <span class="text-danger">*</span></label>
                                    <select class="form-select" formControlName="brandId" required
                                        [ngClass]="{ 'is-invalid': submitted && f['brandId'].errors }">
                                        <option value="" disabled selected>Select a brand</option>
                                        <option *ngFor="let brands of brandsList" [value]="brands.brandId">
                                            {{brands.brandName}}
                                        </option>
                                    </select>
                                    <div *ngIf="submitted && f['brandId'].errors" class="invalid-feedback">
                                        <div *ngIf="f['brandId'].errors['required']">Brand is required</div>
                                    </div>
                                </div>
                                <!-- Price -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold">Unit Price <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><fa-icon [icon]="faDollar"></fa-icon></span>
                                        <input type="number" class="form-control" formControlName="unitPrice"
                                            placeholder="Enter price" step="1" min="0" max="500000"
                                            (keypress)="chkNumber('unitPrice')" required
                                            [ngClass]="{ 'is-invalid': submitted && f['unitPrice'].errors }">
                                    </div>
                                    <div *ngIf="submitted && f['unitPrice'].errors" class="invalid-feedback">
                                        <div *ngIf="f['unitPrice'].errors['required']">Unit price is required</div>
                                    </div>
                                </div>
                                <!-- Sale Price -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold">Sale Price</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><fa-icon [icon]="faDollar"></fa-icon></span>
                                        <input type="number" class="form-control" formControlName="salePrice"
                                            placeholder="Enter sale price" step="1" min="0" max="500000"
                                            (keypress)="chkNumber('salePrice')">
                                    </div>
                                </div>
                                <!-- Purchase Price -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold">Purchase Price</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><fa-icon [icon]="faDollar"></fa-icon></span>
                                        <input type="number" class="form-control" formControlName="purchasePrice"
                                            placeholder="Enter purchase price" step="1" min="0" max="500000"
                                            (keypress)="chkNumber('purchasePrice')">
                                    </div>
                                </div>
                                <!-- Discount -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold">Discount</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><fa-icon [icon]="faDollar"></fa-icon></span>
                                        <input type="number" class="form-control" formControlName="discount"
                                            placeholder="Enter discount" step="1" min="0" max="500000"
                                            (keypress)="chkNumber('discount')">
                                    </div>
                                </div>
                                <!-- Tax -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold">Tax (%)</label>
                                    <div class="input-group">
                                        <span class="input-group-text">%</span>
                                        <input type="number" class="form-control" formControlName="tax"
                                            placeholder="Enter tax" step="1" min="0" max="100"
                                            (keypress)="chkNumber('tax')">
                                    </div>
                                </div>
                                <!-- HSN -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold">HSN Code</label>
                                    <input type="text" class="form-control" formControlName="hsn"
                                        placeholder="Enter HSN code">
                                </div>
                                <!-- Quantity -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold">Quantity</label>
                                    <input type="number" class="form-control" formControlName="quantity"
                                        placeholder="Enter quantity" step="1" min="0" max="500000"
                                        (keypress)="chkNumber('quantity')">
                                </div>
                                <!-- Made In -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold">Made In</label>
                                    <input type="text" class="form-control" formControlName="madein"
                                        placeholder="Enter country of origin">
                                </div>
                                <!-- Dimension -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold">Dimension</label>
                                    <input type="text" class="form-control" formControlName="physicalDimension"
                                        placeholder="e.g., 10x20x30 cm">
                                </div>
                                <!-- UPC -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">UPC</label>
                                    <input type="text" class="form-control" formControlName="upc"
                                        placeholder="Enter UPC code">
                                </div>
                                <!-- SKU -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">SKU</label>
                                    <input type="text" class="form-control" formControlName="sku"
                                        placeholder="Enter SKU code">
                                </div>
                                <!-- Abbreviated Name -->
                                <div class="col-md-3" *ngIf="appName !== 'ZUBAIDA'">
                                    <label class="form-label fw-bold">Abbreviated Name</label>
                                    <input type="text" class="form-control" formControlName="abbrName"
                                        placeholder="Enter abbreviated name">
                                </div>
                                <!-- Weight -->
                                <div class="col-md-3" *ngIf="appName !== 'ZUBAIDA'">
                                    <label class="form-label fw-bold">Weight</label>
                                    <input type="number" class="form-control" formControlName="weight"
                                        placeholder="Enter weight" step="1" min="0" max="50000"
                                        (keypress)="chkNumber('weight')">
                                </div>
                                <!-- Unit -->
                                <div class="col-md-3" *ngIf="appName !== 'ZUBAIDA'">
                                    <label class="form-label fw-bold">Unit</label>
                                    <select class="form-select" formControlName="unitName">
                                        <option value="" disabled selected>Select unit</option>
                                        <option value="lbs">lbs</option>
                                        <option value="gm">gm</option>
                                        <option value="kg">kg</option>
                                        <option value="liter">liter</option>
                                        <option value="ft">ft</option>
                                        <option value="inch">inch</option>
                                        <option value="pcs">pcs</option>
                                    </select>
                                </div>
                                <!-- Expiry Date -->
                                <div class="col-md-3" *ngIf="appName !== 'ZUBAIDA'">
                                    <label class="form-label fw-bold">Expiry Date</label>
                                    <input type="date" class="form-control" formControlName="expiryDate"
                                        placeholder="Select expiry date">
                                </div>
                                <!-- Case Quantity -->
                                <div class="col-md-3" *ngIf="appName !== 'ZUBAIDA'">
                                    <label class="form-label fw-bold">Case Quantity</label>
                                    <input type="number" class="form-control" formControlName="qtyCase"
                                        placeholder="Enter case quantity" step="1" min="0" max="500000"
                                        (keypress)="chkNumber('caseQuantity')">
                                </div>
                                <!-- Description -->
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Description <span
                                            class="text-danger">*</span></label>
                                    <textarea class="form-control" formControlName="productDetails" rows="4"
                                        placeholder="Enter product description" required
                                        [ngClass]="{ 'is-invalid': submitted && f['productDetails'].errors }"></textarea>
                                    <div *ngIf="submitted && f['productDetails'].errors" class="invalid-feedback">
                                        <div *ngIf="f['productDetails'].errors['required']">Description is required
                                        </div>
                                    </div>
                                </div>
                                <!-- Flags -->
                                <div class="col-md-4">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                formControlName="popularFlag" id="popularFlag">
                                            <label class="form-check-label fw-bold" for="popularFlag">Popular</label>
                                        </div>
                                </div>
                                <div class="col-md-4">
                                    
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                formControlName="productStatus" id="productStatus">
                                            <label class="form-check-label fw-bold" for="productStatus">Active</label>
                                        </div>
                                    
                                </div>
                                <div class="col-md-4">
                                    
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" formControlName="sellinPcs"
                                                id="sellinPcs">
                                            <label class="form-check-label fw-bold" for="sellinPcs">Sell in
                                                Pieces</label>
                                        </div>
                                    
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Attributes Section -->
                    <div class="card shadow-sm mb-4 border-0">
                        <div class="card-header bg-light">
                            <h5 class="mb-0 fw-bold">Product Attributes</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <!-- Sizes -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Sizes</label>
                                    <input class="form-control mb-2" type="text" formControlName="packagingAttributes1"
                                        placeholder="Enter size 1">
                                    <input class="form-control mb-2" type="text" formControlName="packagingAttributes2"
                                        placeholder="Enter size 2">
                                    <input class="form-control mb-2" type="text" formControlName="packagingAttributes3"
                                        placeholder="Enter size 3">
                                    <input class="form-control mb-2" type="text" formControlName="packagingAttributes4"
                                        placeholder="Enter size 4">
                                    <input class="form-control mb-2" type="text" formControlName="packagingAttributes5"
                                        placeholder="Enter size 5">
                                    <input class="form-control mb-2" type="text" formControlName="packagingAttributes6"
                                        placeholder="Enter size 6">
                                    <input class="form-control mb-2" type="text" formControlName="packagingAttributes7"
                                        placeholder="Enter size 7">
                                </div>
                                <!-- Additional Attributes -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Additional Attributes</label>
                                    <input class="form-control mb-2" type="text" formControlName="optionsAttributes1"
                                        placeholder="Enter attribute 1">
                                    <input class="form-control mb-2" type="text" formControlName="optionsAttributes2"
                                        placeholder="Enter attribute 2">
                                    <input class="form-control mb-2" type="text" formControlName="optionsAttributes3"
                                        placeholder="Enter attribute 3">
                                    <input class="form-control mb-2" type="text" formControlName="optionsAttributes4"
                                        placeholder="Enter attribute 4">
                                    <input class="form-control mb-2" type="text" formControlName="optionsAttributes5"
                                        placeholder="Enter attribute 5">
                                    <input class="form-control mb-2" type="text" formControlName="optionsAttributes6"
                                        placeholder="Enter attribute 6">
                                    <input class="form-control mb-2" type="text" formControlName="optionsAttributes7"
                                        placeholder="Enter attribute 7">
                                </div>
                                <!-- Colors -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Colors</label>
                                    <input class="form-control mb-2" type="text" formControlName="extraAttributes1"
                                        placeholder="Enter color 1">
                                    <input class="form-control mb-2" type="text" formControlName="extraAttributes2"
                                        placeholder="Enter color 2">
                                    <input class="form-control mb-2" type="text" formControlName="extraAttributes3"
                                        placeholder="Enter color 3">
                                    <input class="form-control mb-2" type="text" formControlName="extraAttributes4"
                                        placeholder="Enter color 4">
                                    <input class="form-control mb-2" type="text" formControlName="extraAttributes5"
                                        placeholder="Enter color 5">
                                    <input class="form-control mb-2" type="text" formControlName="extraAttributes6"
                                        placeholder="Enter color 6">
                                    <input class="form-control mb-2" type="text" formControlName="extraAttributes7"
                                        placeholder="Enter color 7">
                                </div>
                                <!-- Extra Attributes -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Extra Attributes</label>
                                    <input class="form-control mb-2" type="text" formControlName="cuttingAttributes1"
                                        placeholder="Enter extra attribute 1">
                                    <input class="form-control mb-2" type="text" formControlName="cuttingAttributes2"
                                        placeholder="Enter extra attribute 2">
                                    <input class="form-control mb-2" type="text" formControlName="cuttingAttributes3"
                                        placeholder="Enter extra attribute 3">
                                    <input class="form-control mb-2" type="text" formControlName="cuttingAttributes4"
                                        placeholder="Enter extra attribute 4">
                                    <input class="form-control mb-2" type="text" formControlName="cuttingAttributes5"
                                        placeholder="Enter extra attribute 5">
                                    <input class="form-control mb-2" type="text" formControlName="cuttingAttributes6"
                                        placeholder="Enter extra attribute 6">
                                    <input class="form-control mb-2" type="text" formControlName="cuttingAttributes7"
                                        placeholder="Enter extra attribute 7">
                                </div>
                            </div>
                        </div>
                    </div>
                </form>

                <!-- Images Section -->
                <div class="card shadow-sm mb-4 border-0" *ngIf="showImageFlag">
                    <div class="card-header bg-light">
                        <h5 class="mb-0 fw-bold">Image Attachments</h5>
                    </div>
                    <div class="card-body">
                        <div class="row row-cols-1 row-cols-md-3 g-4">
                            <div class="col" *ngFor="let preview of previewList; index as i">
                                <div class="card h-100 shadow-sm border-0" id="myRemoveButton-{{i}}">
                                    <img [src]="preview" class="card-img-top" style="height: 200px; object-fit: cover;"
                                        alt="Product Image">
                                    <div class="card-body text-center">
                                        <button class="btn btn-danger btn-sm d-flex mx-auto gap-2" 
                                            (click)="removeImage(i)">
                                            <fa-icon [icon]="faRemove"></fa-icon> Remove Image
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="mt-3">
                            <label for="files" class="btn btn-primary d-flex align-items-center gap-2">
                                <i class="bi bi-upload"></i> Attach Images
                            </label>
                            <input type="file" id="files" name="files" class="d-none" accept="image/*"
                                (change)="selectFile($event)" multiple />
                        </div>
                    </div>
                </div>

                <!-- Video Section -->
                <div class="card shadow-sm mb-4 border-0" *ngIf="showProductVideoFlag">
                    <div class="card-header bg-light">
                        <h5 class="mb-0 fw-bold">Video Attachment</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4" *ngIf="videoUrl">
                                <video controls class="w-100" style="max-height: 200px;">
                                    <source [src]="videoUrl" type="video/mp4">
                                    Your browser does not support HTML5 video.
                                </video>
                                <button class="btn btn-danger btn-sm d-flex mx-auto mt-3 gap-2" (click)="removeVideo()">
                                    <fa-icon [icon]="faRemove"></fa-icon> Remove Video
                                </button>
                            </div>
                            <div class="col-12 mt-3">
                                <input type="file" id="videoUpload" class="form-control"
                                    (change)="onFileSelected($event)" accept="video/mp4">
                                <div *ngIf="errorMessage" class="text-danger mt-2">{{ errorMessage }}</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Documents Section -->
                <div class="card shadow-sm mb-4 border-0" *ngIf="showProductDocumentFlag">
                    <div class="card-header bg-light">
                        <h5 class="mb-0 fw-bold">Document Attachments</h5>
                    </div>
                    <div class="card-body">
                        <div class="row row-cols-1 row-cols-md-4 g-4">
                            <div class="col" *ngFor="let document of selectedDocumentList; index as i">
                                <div class="card h-100 shadow-sm border-0 text-center">
                                    <div class="card-body">
                                        <p class="card-text text-truncate">{{document.name}}</p>
                                        <button class="btn btn-danger btn-sm d-flex mx-auto gap-2"
                                            (click)="removeDocument(i)">
                                            <fa-icon [icon]="faRemove"></fa-icon> Remove Document
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="mt-3">
                            <label for="documents" class="btn btn-primary d-flex align-items-center gap-2">
                                <i class="bi bi-upload"></i> Attach Documents
                            </label>
                            <input type="file" id="documents" name="documents" class="d-none"
                                accept=".pdf,.doc,.docx,.xls" (change)="onDocumentSelected($event)" multiple />
                        </div>
                    </div>
                </div>

                <!-- Warehouse Form -->
                <form [formGroup]="warehouseForm" *ngIf="showWarehouseFlag">
                    <div class="card shadow-sm mb-4 border-0">
                        <div class="card-header bg-light">
                            <h5 class="mb-0 fw-bold">Warehouse Details</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <!-- Warehouse -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Warehouse</label>
                                    <select class="form-select" formControlName="warehouseId">
                                        <option value="" disabled selected>Select a warehouse</option>
                                        <option *ngFor="let warehouse of warehouseList" [value]="warehouse.warehouseId">
                                            {{warehouse.warehouseName}}
                                        </option>
                                    </select>
                                </div>
                                <!-- Floor -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Floor</label>
                                    <input type="text" class="form-control" formControlName="wFloor"
                                        placeholder="Enter floor number">
                                </div>
                                <!-- Aisle -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Aisle</label>
                                    <input type="text" class="form-control" formControlName="wAisle"
                                        placeholder="Enter aisle number">
                                </div>
                                <!-- Row -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Row</label>
                                    <input type="text" class="form-control" formControlName="wRow"
                                        placeholder="Enter row number">
                                </div>
                                <!-- Bin -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Bin</label>
                                    <input type="text" class="form-control" formControlName="wBin"
                                        placeholder="Enter bin number">
                                </div>
                                <!-- From Warehouse -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">From Warehouse</label>
                                    <select class="form-select" formControlName="fromWarehouseId">
                                        <option value="" disabled selected>Select source warehouse</option>
                                        <option *ngFor="let warehouse of warehouseList"
                                            [value]="warehouse.fromWarehouseId">
                                            {{warehouse.warehouseName}}
                                        </option>
                                    </select>
                                </div>
                                <!-- Quantity -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Quantity</label>
                                    <input type="number" class="form-control" formControlName="quantity"
                                        placeholder="Enter quantity" step="1" min="0" max="500000"
                                        (keypress)="chkNumber('quantity')">
                                </div>
                                <!-- In Transit -->
                                <div class="col-md-3 d-flex align-items-end">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" formControlName="intransitFlag"
                                            id="intransitFlag">
                                        <label class="form-check-label fw-bold" for="intransitFlag">In Transit</label>
                                    </div>
                                </div>
                                <!-- Shipment Mode -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold">Shipment Mode</label>
                                    <input type="text" class="form-control" formControlName="shipmentMode"
                                        placeholder="Enter shipment mode">
                                </div>
                            </div>
                        </div>
                    </div>
                </form>

                <!-- Fixed Bottom Action Buttons -->
                <div class="bg-white shadow-sm py-3">
                    <div class="container-fluid">
                        <div class="row justify-content-center">
                            <div class="col-6 col-lg-6 ">
                                    <button type="button" class="btn btn-success"
                                        (click)="onSubmit()">
                                        <fa-icon [icon]="faSave"></fa-icon> Save
                                    </button>
                            </div>
                            <div class="col-6 col-lg-6 ">    
                                    <button type="button" class="btn btn-primary "
                                        (click)="backToList()">
                                        <fa-icon [icon]="faHome"></fa-icon> Product List
                                    </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


        </div>
    </div>
</div>
