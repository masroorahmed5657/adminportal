<div class="table-responsive d-none d-md-block">
  <table class="table table-striped table-hover align-middle">
    <thead class="bg-light">
      <tr>
        <th>Days</th>
        <th>Store Opens</th>
        <th>Store Closes</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let hrs of storeHoursList; let row = index">
        <td class="fw-semibold">{{ hrs.days }}</td>

        <!-- Store Open -->
        <td>
          <div class="d-flex align-items-center gap-2">
            <input type="text"
                   class="form-control w-auto"
                   [(ngModel)]="hrs.storeOpen"
                   name="storeOpen-{{row}}" />

            <div class="btn-group">
              <button class="btn btn-sm"
                      [class.btn-primary]="hrs.openAmpm === 'AM'"
                      [class.btn-outline-primary]="hrs.openAmpm !== 'AM'"
                      (click)="hrs.openAmpm='AM'">AM</button>

              <button class="btn btn-sm"
                      [class.btn-primary]="hrs.openAmpm === 'PM'"
                      [class.btn-outline-primary]="hrs.openAmpm !== 'PM'"
                      (click)="hrs.openAmpm='PM'">PM</button>
            </div>
          </div>
        </td>

        <!-- Store Close -->
        <td>
          <div class="d-flex align-items-center gap-2">
            <input type="text"
                   class="form-control w-auto"
                   [(ngModel)]="hrs.storeClose"
                   name="storeClose-{{row}}" />

            <div class="btn-group">
              <button class="btn btn-sm"
                      [class.btn-primary]="hrs.closeAmpm === 'AM'"
                      [class.btn-outline-primary]="hrs.closeAmpm !== 'AM'"
                      (click)="hrs.closeAmpm='AM'">AM</button>

              <button class="btn btn-sm"
                      [class.btn-primary]="hrs.closeAmpm === 'PM'"
                      [class.btn-outline-primary]="hrs.closeAmpm !== 'PM'"
                      (click)="hrs.closeAmpm='PM'">PM</button>
            </div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
<div class="d-block d-md-none">
  <div class="card shadow-sm mb-3"
       *ngFor="let hrs of storeHoursList; let row = index">

    <div class="card-body p-3">

      <h6 class="fw-bold text-primary mb-3">
        {{ hrs.days }}
      </h6>

      <!-- Store Open -->
      <div class="mb-3">
        <label class="small fw-semibold text-muted">Store Opens</label>

        <div class="d-flex gap-2 align-items-center">
          <input type="text"
                 class="form-control form-control-sm"
                 [(ngModel)]="hrs.storeOpen"
                 name="storeOpen-{{row}}" />

          <div class="btn-group">
            <button class="btn btn-sm"
                    [class.btn-primary]="hrs.openAmpm === 'AM'"
                    [class.btn-outline-primary]="hrs.openAmpm !== 'AM'"
                    (click)="hrs.openAmpm='AM'">AM</button>

            <button class="btn btn-sm"
                    [class.btn-primary]="hrs.openAmpm === 'PM'"
                    [class.btn-outline-primary]="hrs.openAmpm !== 'PM'"
                    (click)="hrs.openAmpm='PM'">PM</button>
          </div>
        </div>
      </div>

      <!-- Store Close -->
      <div>
        <label class="small fw-semibold text-muted">Store Closes</label>

        <div class="d-flex gap-2 align-items-center">
          <input type="text"
                 class="form-control form-control-sm"
                 [(ngModel)]="hrs.storeClose"
                 name="storeClose-{{row}}" />

          <div class="btn-group">
            <button class="btn btn-sm"
                    [class.btn-primary]="hrs.closeAmpm === 'AM'"
                    [class.btn-outline-primary]="hrs.closeAmpm !== 'AM'"
                    (click)="hrs.closeAmpm='AM'">AM</button>

            <button class="btn btn-sm"
                    [class.btn-primary]="hrs.closeAmpm === 'PM'"
                    [class.btn-outline-primary]="hrs.closeAmpm !== 'PM'"
                    (click)="hrs.closeAmpm='PM'">PM</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<div class="d-flex justify-content-center gap-3 mt-4">
  <button class="btn btn-success px-4"
          style="background-color:#2563eb"
          (click)="onSaveAll()">
    <i class="bi bi-save"></i> Save
  </button>

  <button class="btn btn-danger px-4"
          (click)="onCancel()">
    <i class="bi bi-x-circle"></i> Cancel
  </button>
</div>
