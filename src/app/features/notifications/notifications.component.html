<div class="container py-4">
  <div class="card shadow-sm border border-2 rounded-3">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold">Notifications</h5>
      <button class="btn btn-sm btn-outline-primary">
        Mark all as read
      </button>
    </div>
    <ul class="list-group list-group-flush">
      
      <!-- Notification Item -->
      <li class="list-group-item d-flex align-items-center">
        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width:40px; height:40px;">
          <i class="bi bi-bell-fill"></i>
        </div>
        <div>
          <p class="mb-1 fw-semibold">New order received</p>
          <small class="text-muted">2 mins ago</small>
        </div>
        <span class="badge bg-success ms-auto">New</span>
      </li>

      <!-- Notification Item -->
      <li class="list-group-item d-flex align-items-center">
        <div class="bg-danger text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width:40px; height:40px;">
          <i class="bi bi-exclamation-circle-fill"></i>
        </div>
        <div>
          <p class="mb-1 fw-semibold">Server down alert</p>
          <small class="text-muted">10 mins ago</small>
        </div>
      </li>

      <!-- Notification Item -->
      <li class="list-group-item d-flex align-items-center">
        <div class="bg-warning text-dark rounded-circle d-flex align-items-center justify-content-center me-3" style="width:40px; height:40px;">
          <i class="bi bi-chat-left-text-fill"></i>
        </div>
        <div>
          <p class="mb-1 fw-semibold">New comment on post</p>
          <small class="text-muted">1 hr ago</small>
        </div>
      </li>

    </ul>
  </div>
</div>
